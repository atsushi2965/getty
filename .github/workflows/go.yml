# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Get Go version
      id: version
      run: echo "version=$(go version)" >> $GITHUB_OUTPUT

    - name: Build
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        mkdir -p bin
        if [ "${{ matrix.os }}" = "windows" ]; then
          go build -o bin/getty-${{ matrix.os }}-${{ matrix.arch }}.exe -v getty.go
        else
          go build -o bin/getty-${{ matrix.os }}-${{ matrix.arch }} -v getty.go
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: getty-${{ matrix.os }}-${{ matrix.arch }}
        path: bin/
        compression-level: 9

  release:
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ needs.build.outputs.version }}
        files: artifacts/**
        generate_release_notes: true
